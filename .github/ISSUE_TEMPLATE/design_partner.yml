name: Release evaluation design partner
description: Volunteer for a content-safe evaluation of a published Stemma workflow
title: "[design partner] "
labels:
  - design-partner
body:
  - type: markdown
    attributes:
      value: |
        This intake is for a documented Stemma workflow, not unrestricted Word automation. Do not include a customer, party, matter, document, filename, path, excerpt, worklist, receipt, or document hash.
  - type: dropdown
    id: workflow
    attributes:
      label: Workflow category
      options:
        - Contract lifecycle management
        - Legal operations
        - Procurement operations
        - Contract automation development
        - Other existing-agreement workflow
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface you can evaluate
      options:
        - Published CLI package
        - Published MCP package
        - Rust crate
        - Clean exact-source build
    validations:
      required: true
  - type: dropdown
    id: word
    attributes:
      label: Can an independent reviewer adjudicate the result in desktop Microsoft Word?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: dropdown
    id: task
    attributes:
      label: Do you have a local, content-safe way to evaluate a documented review or redline task?
      options:
        - "Yes"
        - "No"
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Content-safe outcome you need
      description: Describe the workflow class and desired redline/receipt outcome without quoting or identifying any document.
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Boundary confirmation
      options:
        - label: I will evaluate the documented coverage and report named refusals or unsearched regions honestly.
          required: true
        - label: I will keep real documents, worklists, receipts, paths, document hashes, filenames, and excerpts local.
          required: true
        - label: I understand a safe refusal is not a correct completion.
          required: true
